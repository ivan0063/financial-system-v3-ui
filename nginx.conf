server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — resolves container names at request time, not startup
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $$uri =404;
    }

    # Proxy all /api/* requests to the backend.
    # ${BACKEND_URL} is replaced at container start by envsubst.
    # $$host, $$remote_addr etc. use $$ so envsubst leaves them as
    # literal $host / $remote_addr for nginx to evaluate at request time.
    location /api/ {
        set $upstream "${BACKEND_URL}";
        proxy_pass $upstream/;
        proxy_http_version 1.1;

        proxy_set_header Host              $$host;
        proxy_set_header X-Real-IP         $$remote_addr;
        proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $$scheme;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback — React Router needs this on hard refresh
    location / {
        try_files $$uri $$uri/ /index.html;
    }
}
